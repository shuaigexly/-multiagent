version: '3.9'

services:
  backend:
    build:
      context: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/workbench.db
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
